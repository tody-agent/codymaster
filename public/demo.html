<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Try CodyMaster — Interactive Demo</title>
  <meta name="description" content="Experience CodyMaster in action. Chat with AI and watch it build a real product — right in your browser.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="stylesheet" href="css/kit.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="demo-page">

  <!-- ═══════ TOP BAR ═══════ -->
  <div class="demo-topbar">
    <span class="demo-topbar__title" data-i18n="demoPage.topBar">⚡ CodyMaster Demo</span>
    <div style="display:flex;align-items:center;gap:16px">
      <div class="lang-switcher" id="lang-switcher">
        <button class="lang-btn" id="lang-toggle" aria-label="Select language" aria-expanded="false">
          <span class="lang-btn-icon">🌍</span>
          <span class="lang-btn-text" id="lang-btn-text">EN</span>
          <span class="lang-btn-caret">▾</span>
        </button>
        <div class="lang-menu" id="lang-menu">
          <button class="lang-option" data-lang="en">
            <span class="lang-flag">🇬🇧</span> <span class="lang-name">English</span>
          </button>
          <button class="lang-option" data-lang="vi">
            <span class="lang-flag">🇻🇳</span> <span class="lang-name">Tiếng Việt</span>
          </button>
          <button class="lang-option" data-lang="zh">
            <span class="lang-flag">🇨🇳</span> <span class="lang-name">中文</span>
          </button>
          <button class="lang-option" data-lang="ru">
            <span class="lang-flag">🇷🇺</span> <span class="lang-name">Русский</span>
          </button>
          <button class="lang-option" data-lang="ko">
            <span class="lang-flag">🇰🇷</span> <span class="lang-name">한국어</span>
          </button>
          <button class="lang-option" data-lang="hi">
            <span class="lang-flag">🇮🇳</span> <span class="lang-name">हिन्दी</span>
          </button>
        </div>
      </div>
      <a href="index.html" class="demo-topbar__exit" data-i18n="demoPage.exitDemo">← Back to Home</a>
    </div>
  </div>

  <!-- ═══════ CHAT AREA ═══════ -->
  <div class="demo-chat">
    <div class="demo-messages" id="demoMessages">
      <!-- Populated by JS -->
    </div>
  </div>

  <!-- ═══════ INPUT BAR ═══════ -->
  <div class="demo-input-bar">
    <input type="text" class="demo-input-bar__input" id="demoInput" data-i18n-placeholder="demoPage.inputPlaceholder" placeholder="Type what you want to build...">
    <button class="demo-input-bar__send" id="demoSend" data-i18n="demoPage.sendButton">Send</button>
  </div>

  <script src="js/kit.js"></script>
  <script src="js/demo-page.js"></script>
</body>
</html>
